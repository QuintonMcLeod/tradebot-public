<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="./dist/output.css" rel="stylesheet">
    <title>Stitch AI Trading Assistant</title>
    <!-- Material Symbols -->
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        .titlebar-drag {
            -webkit-app-region: drag;
        }

        .no-drag {
            -webkit-app-region: no-drag;
        }

        .panic-stripes {
            background-color: #dc2626;
            background-image: repeating-linear-gradient(45deg,
                    transparent,
                    transparent 10px,
                    rgba(0, 0, 0, 0.3) 10px,
                    rgba(0, 0, 0, 0.3) 20px);
        }

        /* Custom Scrollbar */
        .scrollbar-thin::-webkit-scrollbar {
            width: 4px;
        }

        .scrollbar-thin::-webkit-scrollbar-track {
            background: transparent;
        }

        .scrollbar-thin::-webkit-scrollbar-thumb {
            background: rgba(20, 184, 166, 0.2);
            border-radius: 10px;
        }
    </style>
</head>

<body class="text-slate-300 font-sans h-screen w-screen overflow-hidden flex flex-col select-none">

    <!-- BACKGROUND GRADIENT MESH - SPOT UPPER LEFT (INTENSIFIED) -->
    <!-- BACKGROUND GRADIENT MESH - SPOT UPPER LEFT (TEAL -> NAVY) -->
    <div class="fixed inset-0 bg-[#020617] -z-30"></div>
    <div
        class="fixed inset-0 bg-[radial-gradient(circle_at_0%_0%,_#0d9488_0%,_#1e1b4b_60%,_transparent_100%)] opacity-50 -z-20">
    </div>

    <!-- Title Bar (Win98 Gradient Style) -->
    <div
        class="h-10 bg-[linear-gradient(90deg,#0058e6_0%,#002159_100%)] border-b-2 border-white/10 flex items-center px-4 justify-between titlebar-drag shrink-0">
        <div class="flex items-center gap-2">
            <span class="material-symbols-outlined text-white text-base">smart_toy</span>
            <span class="text-[11px] font-black uppercase tracking-[0.2em] text-white">Tradebot SCI - <span
                    class="opacity-70">AI Trading Assistant</span></span>
        </div>
        <div class="flex gap-4 no-drag pt-1">
            <span class="material-symbols-outlined text-white/70 text-sm hover:text-white cursor-pointer">remove</span>
            <span
                class="material-symbols-outlined text-white/70 text-sm hover:text-white cursor-pointer">crop_square</span>
            <span class="material-symbols-outlined text-white/70 text-sm hover:text-red-400 cursor-pointer"
                onclick="window.close()">close</span>
        </div>
    </div>

    <!-- ERROR OVERLAY FOR DEBUGGING -->
    <div id="debug-error-overlay"
        class="fixed top-10 right-0 max-w-lg bg-red-900/90 text-white text-xs font-mono p-4 z-[9999] pointer-events-none hidden">
    </div>
    <script>
        window.onerror = function (msg, url, line, col, error) {
            const overlay = document.getElementById('debug-error-overlay');
            if (overlay) {
                overlay.classList.remove('hidden');
                overlay.innerHTML += `<div><strong>Error:</strong> ${msg} <br> <span class="opacity-70">${url}:${line}:${col}</span></div><hr class="border-white/20 my-2">`;
            }
        };
    </script>

    <!-- MAIN APP WRAPPER -->
    <div class="flex-1 flex overflow-hidden pt-10 pb-6 px-6 gap-6">

        <!-- SIDEBAR WRAPPER -->
        <div class="flex flex-col gap-4 shrink-0 h-full">
            <!-- SIDEBAR (Floating Box with INTENSE UPPER LEFT GRADIENT) -->
            <!-- SIDEBAR (Teal -> Dark Teal Spot Gradient - Darkened) -->
            <div
                class="w-[230px] flex-1 rounded-md flex flex-col p-6 gap-8 bg-[radial-gradient(circle_at_0%_0%,_#115e59_0%,_#020617_90%)] border-2 border-teal-500/30 z-20 shadow-[-15px_0_45px_rgba(0,0,0,0.6)]">

                <!-- Navigation -->
                <nav class="flex flex-col gap-2">
                    <button id="nav-dashboard"
                        class="flex items-center gap-3 px-4 py-3.5 rounded-xl bg-teal-500/20 text-teal-300 font-bold text-sm border-2 border-teal-500/30 shadow-[0_0_20px_rgba(20,184,166,0.3)] transition-all">
                        <span class="material-symbols-outlined text-xl">speed</span>
                        <span>Dashboard</span>
                    </button>
                    <button id="nav-graph"
                        class="flex items-center justify-start text-left gap-3 px-4 py-3.5 rounded-xl hover:bg-white/5 text-slate-400 hover:text-white transition-all text-sm font-medium">
                        <span class="material-symbols-outlined text-xl">show_chart</span>
                        <span>Graph</span>
                    </button>
                    <button id="nav-settings"
                        class="flex items-center justify-start text-left gap-3 px-4 py-3.5 rounded-xl hover:bg-white/5 text-slate-400 hover:text-white transition-all text-sm font-medium">
                        <span class="material-symbols-outlined text-xl">settings</span>
                        <span>Settings</span>
                    </button>
                    <button id="nav-profile"
                        class="flex items-center justify-start text-left gap-3 px-4 py-3.5 rounded-xl hover:bg-white/5 text-slate-400 hover:text-white transition-all text-sm font-medium">
                        <span class="material-symbols-outlined text-xl">person</span>
                        <span>Profile</span>
                    </button>
                </nav>

                <div class="mt-auto"></div>

                <!-- Status Box -->
                <div class="p-5 rounded-2xl bg-black/40 border-2 border-teal-500/20 space-y-4 shadow-inner">
                    <div class="space-y-1">
                        <div class="text-[10px] text-slate-500 font-bold uppercase tracking-wider">Active Profile:</div>
                        <div id="status-profile" class="text-xs text-teal-400 font-bold">--</div>
                    </div>
                    <div class="flex items-center gap-2">
                        <span id="status-dot"
                            class="w-2.5 h-2.5 rounded-full bg-red-500 shadow-[0_0_10px_rgba(239,68,68,0.5)]"></span>
                        <span id="status-text"
                            class="text-[10px] text-white/60 font-black uppercase tracking-widest text-shadow">Status:
                            OFFLINE</span>
                    </div>
                    <div class="space-y-1">
                        <div class="text-[10px] text-slate-500 font-bold uppercase tracking-wider">Profit and Loss:
                        </div>
                        <div class="text-sm font-black text-white">$ <span id="account-equity">0.00</span></div>
                    </div>
                    <div class="text-[10px] text-slate-500 font-bold">Latency: <span id="status-latency"
                            class="text-teal-500 font-mono">--</span></div>
                </div>
            </div>

            <!-- Panic Box (Standalone below sidebar) -->
            <div id="panic-box-outer"
                class="w-[230px] p-2 rounded-md bg-[#020617] border-2 border-teal-500/40 shadow-xl">
                <button id="btn-panic"
                    class="w-full py-3.5 rounded-md panic-stripes relative overflow-hidden shadow-lg border-2 border-red-500/40 hover:brightness-110 active:scale-95 transition-all text-white">
                    <span id="panic-text"
                        class="text-[10px] font-black uppercase tracking-widest relative z-10 leading-tight block">
                        Panic Button<br>
                        <span class="text-[9px] opacity-80">Halt All Trading</span>
                    </span>
                </button>
            </div>
        </div>

        <!-- MAIN VIEW (Vertical Stack) -->
        <div class="flex-1 flex flex-col gap-6 p-6 min-w-0">

            <!-- CHART PANEL (Deep Navy + Thick Borders) -->
            <div
                class="flex-[3] bg-[#020617] rounded-3xl border-2 border-teal-500/20 flex flex-col relative overflow-hidden shadow-2xl">
                <!-- Inner Header -->
                <div class="h-14 flex items-center justify-between px-6 border-b-2 border-teal-500/10 bg-black/40">
                    <div class="flex items-center gap-4">
                        <div class="flex gap-2 bg-black/50 p-1 rounded-xl border border-white/5">
                            <span
                                class="timeframe-btn text-[10px] px-3 py-1 rounded-lg cursor-pointer text-slate-400 hover:text-white transition-colors">1m</span>
                            <span
                                class="timeframe-btn text-[10px] px-3 py-1 rounded-lg cursor-pointer text-slate-400 hover:text-white transition-colors">5m</span>
                            <span
                                class="timeframe-btn text-[10px] px-3 py-1 rounded-lg bg-teal-500/20 text-teal-300 border border-teal-500/40 font-bold">15m</span>
                            <span
                                class="timeframe-btn text-[10px] px-3 py-1 rounded-lg cursor-pointer text-slate-400 hover:text-white transition-colors">1h</span>
                        </div>
                        <div class="w-px h-5 bg-white/10"></div>
                        <button id="btn-calendar"
                            class="flex items-center gap-2 text-[10px] text-slate-400 hover:text-white font-bold uppercase tracking-widest transition-all">
                            <span class="material-symbols-outlined text-base">calendar_month</span> Date
                        </button>
                        <input type="date" id="date-picker-input" class="hidden">
                        <div class="w-px h-5 bg-white/10"></div>
                        <button id="btn-indicators"
                            class="flex items-center gap-2 text-[10px] text-slate-400 hover:text-white font-bold uppercase tracking-widest">
                            <span class="material-symbols-outlined text-base">ssid_chart</span> Indicator
                        </button>
                    </div>
                    <div class="flex items-center gap-6">
                        <div class="flex gap-2 text-white/50">
                            <button id="btn-prev-symbol" class="hover:text-white transition-all"><span
                                    class="material-symbols-outlined text-xl">undo</span></button>
                            <button id="btn-next-symbol"
                                class="hover:text-white transition-all transform scale-x-[-1]"><span
                                    class="material-symbols-outlined text-xl">undo</span></button>
                        </div>
                        <div
                            class="flex items-center gap-2 px-4 py-1.5 bg-emerald-500/10 border-2 border-emerald-500/20 rounded-full">
                            <span
                                class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse shadow-[0_0_8px_#10b981]"></span>
                            <span
                                class="text-[10px] font-black text-emerald-400 uppercase tracking-widest text-glow-sm">Live</span>
                        </div>
                    </div>
                </div>

                <!-- Symbol Display Overlay -->
                <div class="absolute top-20 left-8 z-10 pointer-events-none">
                    <div class="flex flex-col">
                        <span class="text-3xl font-black text-white tracking-tighter uppercase"><span
                                id="chart-symbol-label">EURUSD</span> <span id="chart-tf-label"
                                class="text-teal-500 font-bold text-lg ml-1">15m</span></span>
                    </div>
                </div>

                <!-- Chart Container -->
                <div id="chart-area" class="flex-1 w-full bg-transparent"></div>
            </div>

            <!-- BOTTOM ROTATING PANEL (Deep Navy + Thick Borders - Win98 Container) -->
            <div
                class="flex-[1.5] rounded-md p-[3px] bg-[radial-gradient(circle_at_0%_0%,_#0f766e_0%,_#020617_70%)] shadow-2xl flex flex-col overflow-hidden min-h-[220px]">

                <!-- Win98 Gradient Frame Header (Part of the Outer Gradient) -->
                <div class="h-10 flex items-center justify-between px-6 shrink-0">
                    <button id="btn-prev-panel" class="text-teal-500/50 hover:text-teal-400 transition-all"><span
                            class="material-symbols-outlined text-base">chevron_left</span></button>
                    <span id="panel-title"
                        class="text-[10px] font-black uppercase tracking-[0.5em] text-teal-500/90 text-shadow-sm">Decisions
                        Panel</span>
                    <button id="btn-next-panel" class="text-teal-500/50 hover:text-teal-400 transition-all"><span
                            class="material-symbols-outlined text-base">chevron_right</span></button>
                </div>

                <!-- Win98 Inner Content Well (Semi-transparent Black) -->
                <div
                    class="flex-1 bg-black/80 rounded-b-md rounded-t-sm mx-[1px] mb-[1px] overflow-hidden relative border-t border-white/5 shadow-inner">
                    <!-- Decisions Tab -->
                    <div id="panel-decisions" class="absolute inset-0 overflow-auto scrollbar-hide">
                        <table class="w-full text-left border-collapse">
                            <thead
                                class="sticky top-0 bg-[#020617]/90 backdrop-blur-sm z-10 border-b border-teal-500/10">
                                <tr class="text-teal-500 font-black uppercase tracking-[0.3em] text-base">
                                    <th class="px-1 py-4 w-24 cursor-pointer hover:text-teal-300 select-none sortable-header border-r border-teal-500/10"
                                        data-col="0">Time</th>
                                    <th class="px-1 py-4 w-24 cursor-pointer hover:text-teal-300 select-none sortable-header border-r border-teal-500/10"
                                        data-col="1">Symbol</th>
                                    <th class="px-1 py-4 w-32 cursor-pointer hover:text-teal-300 select-none sortable-header border-r border-teal-500/10"
                                        data-col="2">Action</th>
                                    <th class="px-1 py-4 w-24 cursor-pointer hover:text-teal-300 select-none sortable-header border-r border-teal-500/10 text-center"
                                        data-col="3">Score</th>
                                    <th class="px-1 py-4 cursor-pointer hover:text-teal-300 select-none sortable-header"
                                        data-col="4">Reason</th>
                                </tr>
                            </thead>
                            <tbody id="decisions-table"
                                class="divide-y-2 divide-teal-900/10 font-mono text-base text-slate-400">
                            </tbody>
                        </table>
                    </div>

                    <!-- AI Commentary Tab -->
                    <div id="panel-commentary" class="absolute inset-0 p-8 overflow-auto hidden">
                        <div id="commentary-content" class="text-sm italic text-teal-300 leading-relaxed font-serif">
                            Waiting for AI Signal Breakdown...
                        </div>
                    </div>

                    <!-- Holdings Tab -->
                    <div id="panel-holdings" class="absolute inset-0 overflow-auto hidden">
                        <table class="w-full text-left border-collapse">
                            <thead
                                class="sticky top-0 bg-[#020617]/90 backdrop-blur-sm z-10 border-b border-teal-500/10">
                                <tr class="text-teal-500 font-black uppercase tracking-[0.3em] text-[10px]">
                                    <th class="px-8 py-4">Symbol</th>
                                    <th class="px-8 py-4 text-center">Side</th>
                                    <th class="px-8 py-4 text-right">Size</th>
                                    <th class="px-8 py-4 text-right">PnL (USD)</th>
                                </tr>
                            </thead>
                            <tbody id="holdings-table-body"
                                class="font-mono text-xs text-slate-300 divide-y divide-teal-900/10">
                                <!-- Populated by JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- LOG PANEL (Win98 Container - Thinner Borders) -->
            <div
                class="flex-1 rounded-md p-[2px] bg-[radial-gradient(circle_at_0%_0%,_#0f766e_0%,_#020617_70%)] shadow-2xl flex flex-col overflow-hidden min-h-[160px]">

                <!-- Win98 Frame Header -->
                <div class="h-8 flex items-center justify-center shrink-0">
                    <span class="text-[10px] font-black uppercase tracking-[0.5em] text-slate-400/80">System Logs</span>
                </div>

                <!-- Win98 Inner Content Well -->
                <div id="log-terminal"
                    class="flex-1 p-5 font-mono text-[13px] text-slate-300 overflow-y-auto overflow-x-hidden break-all leading-relaxed bg-black/70 rounded-b-md rounded-t-sm mx-[1px] mb-[1px] scrollbar-thin space-y-1.5 shadow-inner">
                </div>
            </div>

        </div>

    </div>

    <!-- Chart Library -->
    <script src="./lightweight-charts.js"></script>
    <!-- App Logic -->
    <script src="renderer.js"></script>
</body>

</html>
