<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="./dist/output.css" rel="stylesheet">
    <title>Settings</title>
    <!-- Material Symbols -->
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="settings.css">
</head>

<body class="text-slate-300 font-sans h-screen w-screen overflow-hidden flex flex-col select-none glass-base">

    <!-- Title Bar -->
    <div
        class="h-12 bg-black/60 border-b border-white/5 flex items-center px-6 justify-between titlebar-drag shrink-0 relative z-50">
        <div class="flex items-center gap-3">
            <div class="w-7 h-7 rounded-lg bg-teal-500/20 flex items-center justify-center border border-teal-500/30">
                <span class="material-symbols-outlined text-teal-400 text-base">settings</span>
            </div>
            <span class="text-sm font-bold text-white/90">Settings</span>
        </div>
        <div class="flex gap-4 no-drag items-center">
            <span id="btn-minimize"
                class="material-symbols-outlined text-white/40 text-sm hover:text-white cursor-pointer transition-colors">remove</span>
            <span id="btn-close"
                class="material-symbols-outlined text-white/40 text-sm hover:text-red-400 cursor-pointer transition-colors">close</span>
        </div>
    </div>

    <!-- MAIN APP WRAPPER -->
    <div class="flex-1 flex overflow-hidden">

        <!-- SIDEBAR -->
        <div class="w-72 bg-black/40 border-r border-white/5 flex flex-col p-6 gap-1 relative z-40">
            <div class="text-[9px] font-black uppercase tracking-[0.3em] text-slate-500 mb-4 px-4">Menu</div>

            <button data-tab="system" class="nav-btn active">
                <span class="material-symbols-outlined">dashboard</span>
                <div class="flex flex-col items-start">
                    <span class="text-sm font-bold">System</span>
                    <span class="text-[9px] opacity-50 uppercase tracking-tighter">Core Runtime & Mode</span>
                </div>
            </button>

            <button data-tab="strategy" class="nav-btn">
                <span class="material-symbols-outlined">precision_manufacturing</span>
                <div class="flex flex-col items-start">
                    <span class="text-sm font-bold">Strategy Workshop</span>
                    <span class="text-[9px] opacity-50 uppercase tracking-tighter">Risk & Sizing Logic</span>
                </div>
            </button>

            <button data-tab="brokers" class="nav-btn">
                <span class="material-symbols-outlined">lan</span>
                <div class="flex flex-col items-start">
                    <span class="text-sm font-bold">Broker Suite</span>
                    <span class="text-[9px] opacity-50 uppercase tracking-tighter">IBKR & CCXT Stacks</span>
                </div>
            </button>

            <button data-tab="ai" class="nav-btn">
                <span class="material-symbols-outlined">auto_awesome</span>
                <div class="flex flex-col items-start">
                    <span class="text-sm font-bold">Intelligence</span>
                    <span class="text-[9px] opacity-50 uppercase tracking-tighter">AI Models & Commentary</span>
                </div>
            </button>

            <button data-tab="schedule" class="nav-btn">
                <span class="material-symbols-outlined">event_repeat</span>
                <div class="flex flex-col items-start">
                    <span class="text-sm font-bold">Hours & Sabbath</span>
                    <span class="text-[9px] opacity-50 uppercase tracking-tighter">Timezone & Guards</span>
                </div>
            </button>

            <div class="mt-auto pt-6 border-t border-white/5 flex flex-col gap-1">
                <button data-tab="advanced" class="nav-btn">
                    <span class="material-symbols-outlined">terminal</span>
                    <div class="flex flex-col items-start">
                        <span class="text-sm font-bold">Advanced</span>
                        <span class="text-[9px] opacity-50 uppercase tracking-tighter">Raw Env Variables</span>
                    </div>
                </button>
            </div>
        </div>

        <!-- CONTENT AREA -->
        <div class="flex-1 flex flex-col min-w-0 bg-[#020617]/40 relative">
            <!-- Search Bar Overlay for Advanced Tab -->
            <div id="search-container"
                class="absolute top-6 right-8 z-50 hidden animate-in fade-in slide-in-from-top-2 duration-300">
                <div class="relative">
                    <span
                        class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-sm">search</span>
                    <input type="text" id="setting-search" placeholder="Filter variables..."
                        class="bg-black/60 border border-white/10 rounded-full py-2 pl-10 pr-6 text-xs text-white focus:outline-none focus:border-teal-500/50 w-64 shadow-2xl">
                </div>
            </div>

            <div id="tab-content" class="flex-1 overflow-y-auto p-12 scrollbar-thin">
                <!-- Tab content will be rendered here -->
            </div>

            <!-- ACTION FOOTER -->
            <div class="h-24 border-t border-white/5 bg-black/60 flex items-center px-12 justify-between shrink-0">
                <div class="flex flex-col">
                    <div class="text-[10px] text-teal-400 font-black uppercase tracking-[0.2em]">Session Changes
                    </div>
                    <div id="change-counter" class="text-xs text-slate-500 font-bold">0 unsaved changes detected
                    </div>
                </div>
                <div class="flex gap-4">
                    <button id="btn-revert"
                        class="px-8 py-3 rounded-xl bg-white/5 hover:bg-white/10 text-xs font-bold transition-all border border-white/5">Revert</button>
                    <button id="btn-save"
                        class="px-10 py-3 rounded-xl bg-teal-500 hover:bg-primary-hover text-black text-xs font-black uppercase tracking-widest transition-all shadow-[0_0_30px_rgba(20,184,166,0.2)]">Save
                        Changes</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Tooltip Popup -->
    <div id="tooltip-popup"
        class="fixed z-[100] w-72 bg-[#0f172a] border border-teal-500/30 rounded-xl p-4 shadow-2xl opacity-0 pointer-events-none transition-all duration-200 transform scale-95 translate-y-2">
        <div id="tooltip-title" class="text-[10px] font-black uppercase tracking-widest text-teal-400 mb-2">Variable
        </div>
        <div id="tooltip-content" class="text-xs text-slate-400 leading-relaxed">Explanation...</div>
    </div>


    <script src="settings.js"></script>
</body>

</html>
