<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="./dist/output.css" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        body { 
            margin: 0; 
            background: transparent; 
            overflow: hidden; 
            font-family: 'Inter', sans-serif; 
            -webkit-app-region: drag;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .no-drag { -webkit-app-region: no-drag; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.2); border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(20, 184, 166, 0.3); border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(20, 184, 166, 0.5); }
        
        /* Core Glassmorphism Base & Theme Hookups */
        .glass-container {
            background: var(--bg-card, rgba(15, 23, 42, 0.8));
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--card-border, rgba(20, 184, 166, 0.25));
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            color: var(--text-main, #f3f4f6);
        }

        .theme-header { background: linear-gradient(180deg, var(--accent-dim, rgba(20,184,166,0.06)) 0%, transparent 100%); border-bottom: 1px solid var(--card-border, rgba(20,184,166,0.25)); }
        .theme-accent { color: var(--accent, #14b8a6); }
        
        .theme-body { background: var(--bg-dark, rgba(11, 17, 33, 0.4)); opacity: 0.8; }
        .theme-footer { background: var(--bg-dark, rgba(15, 23, 42, 0.6)); border-top: 1px solid var(--card-border, rgba(20,184,166,0.25)); }
        
        .theme-btn-cancel { background: var(--bg-dark, #0f172a); color: var(--text-main); border: 1px solid var(--text-muted, #334155); }
        .theme-btn-cancel:hover { filter: brightness(1.2); }
        .theme-btn-accept { background: var(--accent-dim, rgba(20, 184, 166, 0.2)); color: var(--accent, #14b8a6); border: 1px solid var(--accent, #14b8a6); box-shadow: 0 0 15px var(--accent-glow, rgba(20, 184, 166, 0.2)); }
        .theme-btn-accept:hover { filter: brightness(1.2); }
    </style>
</head>
<body>

    <div class="glass-container">
        <!-- Header -->
        <div class="flex items-center justify-between p-5 theme-header">
            <h3 class="text-xl font-black theme-accent tracking-wider flex items-center gap-2">
                <span class="material-symbols-outlined text-[24px]">policy</span>
                SYSTEM STARTUP & CONFIRMATION
            </h3>
            <button id="motd-close-btn" class="no-drag text-slate-400 hover:text-white transition-colors cursor-pointer">
                <span class="material-symbols-outlined shrink-0">close</span>
            </button>
        </div>
        
        <!-- Body: MOTD Text -->
        <div class="p-6 overflow-y-auto grow custom-scrollbar relative no-drag theme-body">
            <!-- Subtle gradient overlay to make text pop -->
            <div class="absolute inset-0 pointer-events-none" style="background: linear-gradient(to bottom, var(--accent-dim, rgba(20,184,166,0.05)), transparent);"></div>
            <div id="motd-content-area" class="relative z-10 whitespace-pre-wrap font-mono text-[13px] leading-relaxed" style="color: var(--text-secondary, #e2e8f0);"></div>
        </div>

        <!-- Footer: Actions -->
        <div class="p-5 flex flex-col gap-4 no-drag theme-footer">
            <label class="flex items-center gap-2 cursor-pointer w-fit group">
                <input type="checkbox" id="motd-dont-show-cb" class="hidden">
                <div class="w-4 h-4 rounded border flex items-center justify-center transition-colors" style="border-color: var(--text-dim, #475569); background: var(--bg-dark, #0f172a);">
                    <span id="motd-cb-icon" class="material-symbols-outlined text-[12px] opacity-0 transition-opacity theme-accent">check</span>
                </div>
                <span class="text-xs font-semibold uppercase tracking-wider transition-colors" style="color: var(--text-muted, #94a3b8);">Do not show this safety prompt again</span>
            </label>
            
            <div class="flex justify-end gap-3">
                <button id="motd-cancel-btn" class="px-5 py-2 rounded-lg font-bold transition-colors text-sm theme-btn-cancel">
                    CANCEL
                </button>
                <button id="motd-accept-btn" class="px-6 py-2 rounded-lg font-bold transition-colors text-sm flex items-center gap-2 theme-btn-accept">
                    <span class="material-symbols-outlined text-[18px]">verified</span>
                    ACCEPT & TRADE
                </button>
            </div>
        </div>
    </div>

    <!-- Inject Theme Engine to automatically map var(--accent) etc based on User config -->
    <script src="themes.js"></script>
    <script>
        const { ipcRenderer } = require('electron');

        document.addEventListener('DOMContentLoaded', async () => {
            const cb = document.getElementById('motd-dont-show-cb');
            const cbIcon = document.getElementById('motd-cb-icon');
            const content = document.getElementById('motd-content-area');

            cb.addEventListener('change', () => {
                cbIcon.style.opacity = cb.checked ? '1' : '0';
            });

            // Handle actions
            const reply = (accepted) => {
                ipcRenderer.send('motd-decision', {
                    accepted: accepted,
                    dontShowAgain: cb.checked
                });
            };

            document.getElementById('motd-close-btn').addEventListener('click', () => reply(false));
            document.getElementById('motd-cancel-btn').addEventListener('click', () => reply(false));
            document.getElementById('motd-accept-btn').addEventListener('click', () => reply(true));

            // Fetch and type MOTD
            try {
                const motdText = await ipcRenderer.invoke('get-motd');
                const textToType = motdText || "Welcome to Tradebot SCI.\n\nPlease confirm you want to activate live trading.";
                
                let charIndex = 0;
                function typeChar() {
                    if (charIndex < textToType.length) {
                        content.innerText += textToType.charAt(charIndex);
                        
                        // Auto-scroll logic if the content exceeds viewport while typing
                        content.parentElement.scrollTop = content.parentElement.scrollHeight;

                        charIndex++;
                        setTimeout(typeChar, 7); // Very fast typing
                    }
                }
                setTimeout(typeChar, 100);
            } catch (err) {
                console.error('Failed to get MOTD', err);
                content.innerText = "Error loading MOTD. Proceed with caution.";
            }
        });
    </script>
</body>
</html>
