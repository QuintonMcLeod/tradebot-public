app:
  name: tradebot-sci-enterprise
  environment: dev
  profile_name: auto_schedule
logging:
  level: INFO
  file: logs/tradebot.log
  max_bytes: 1048576
  backup_count: 100
ai:
  provider: deepseek
  model_name: deepseek-chat
  temperature: 0.0
  max_tokens: 1024
  timeout_seconds: 30
  base_url: https://api.deepseek.com
market:
  default_symbol: BTCUSD
  default_timeframe: 5m
  max_candles: 200
  exchange_provider: alternative
  alternative_market_data: ccxt
  alternative_broker: ccxt
  symbols:
  - BTCUSD
  - ETHUSD
  - SOLUSD
  crypto_routing:
    default_exchange: PAXOS
    overrides:
      BTCUSD: ZEROHASH
      ETHUSD: ZEROHASH
      SOLUSD: ZEROHASH
runtime:
  cancel_orders_on_start: false
  flatten_on_exit: false
  intraday_flatten: false
  allow_day_trades: false
  min_hold_seconds: 300
  min_equity_for_margin: 0.0
  position_hold_store_path: data/position_holds.json
  scale_out_fraction: 0.5
  emergency_stop_pct: 0.01
  keep_alive_interval_seconds: 300
  auto_restart_on_error: true
  auto_restart_stale_seconds: 300
  auto_restart_min_uptime_seconds: 120
  auto_restart_cooldown_seconds: 600
  guard_block_threshold: 6
  guard_block_cooldown_cycles: 1
  allow_local_stops: true
  local_stop_symbols:
  - SOLUSD
  - BTCUSD
schedule:
  timezone: America/New_York
  sessions:
  - name: morning
    start: 09:25
    end: '11:45'
  - name: afternoon
    start: '13:30'
    end: '16:05'
