    candle_timeframe: 5m
    market_poll_interval_seconds: 15
    ai_decision_interval_seconds: 60
    htf_timeframe: 15m  # Intraday Signal Timeframe (Indication/Correction/Continuation)
    ltf_timeframe: 5m  # Execution Timeframe
    trend_window: 12  # Faster trend detection
    ltf_trend_window: 8  # Faster LTF signals
    trend_swing_lookback: 2  # More sensitive swing detection
