profiles:
  # Forex Continuous - 24/7 Trading (Sabbath Excluded)
  # Based on Rubberband Reaper v2 (+7,036% verified with tiered risk)
  forex_continuous:
    strategy_variant: rubberband_reaper  # Default fallback

    # Per-Asset-Class Strategies (overrides strategy_variant when symbol matches)
    # Available: rubberband_reaper, robocop, evolution, quantum, mean_reversion,
    #            hyper_scalper, london_breakout, volatility_breakout, aggregator
    strategies:
      crypto: supply_demand    # BTC, ETH, altcoins
      forex: rubberband_reaper     # EUR/USD, GBP/JPY, etc.
      stocks: rubberband_reaper    # Individual equities
      etf: rubberband_reaper       # SPY, QQQ, sector funds
      metals: rubberband_reaper    # Gold, Silver, Platinum
      futures: rubberband_reaper   # ES, NQ, commodities

    candle_timeframe: 15m

    market_poll_interval_seconds: 15
    ai_decision_interval_seconds: 60
    htf_timeframe: 15m
    ltf_timeframe: 5m
    trend_window: 12
    ltf_trend_window: 8
    trend_swing_lookback: 2
    trend_min_swings: 2
    trend_strength_floor: 0.25
    structure_score_threshold: 0.05
    auto_flatten_on_close: false
    pdt_guard_enabled: false
    session_gate_enabled: false  # 24/7 trading (no session gate)
    
    # Risk Management - Tiered Anti-Martingale (20%/10%/1%)
    risk_per_trade_dollars: 0.0
    risk_per_trade_pct: 0.20  # Starting risk (tiered down by strategy)
    short_risk_pct: 0.20
    max_loss_per_trade_dollars: 500.0
    max_concurrent_positions: 4
    multi_position_enabled: true
    max_pyramid_entries: 6
    pyramid_profit_buffer_pct: 0.0015
    
    runtime_overrides:
      market_data_mode: alternative
      broker_mode: alternative
      alternative_market_data: oanda
      alternative_broker: oanda

    # ICC Scoring
    icc_entry_score_threshold: 35.0
    icc_score_continuation_points: 60.0
    icc_score_sweep_points: 25.0
    icc_score_htf_ltf_align_points: 20.0
    icc_score_strong_htf_points: 15.0
    icc_score_phase_points: 5.0
    icc_auto_entry_min_htf_strength: 0.0
    icc_auto_entry_enabled: true
    icc_aggressive_mode: true
    icc_confirmation_bars: 2
    icc_strict_mode: true
    icc_require_liquidity_grab: true
    
    # Pure Forex Symbols Only (OANDA compatible)
    symbols:
    - EURUSD
    - GBPUSD
    - USDJPY
    - AUDUSD
    - USDCAD
    - USDCHF
    - NZDUSD
    - GBPJPY
    - EURJPY
    - AUDJPY

  # Forex Intraday - IBKR Forex with Graduated Entry + Smart Exits
  # Backtested: +865% return over 17 days (Jan 2026) - "The Rubberband Reaper"
  forex_intraday:
    strategy_variant: rubberband_reaper  # Default fallback

    # Per-Asset-Class Strategies
    strategies:
      crypto: supply_demand
      forex: rubberband_reaper     # Primary focus for this profile
      stocks: quantum              # Trend-following for equities
      etf: quantum
      metals: mean_reversion       # Metals tend to range
      futures: volatility_breakout

    candle_timeframe: 15m  # Use 15m for less noisy HTF

    market_poll_interval_seconds: 15
    ai_decision_interval_seconds: 60
    htf_timeframe: 15m     # 15m HTF
    ltf_timeframe: 5m      # 5m LTF for precision entries
    trend_window: 12
    ltf_trend_window: 8
    trend_swing_lookback: 2
    trend_min_swings: 2
    trend_strength_floor: 0.25  # Directional bias floor
    structure_score_threshold: 0.05
    auto_flatten_on_close: false
    pdt_guard_enabled: false  # Forex has no PDT
    session_gate_enabled: true
    
    # [RISK MANAGEMENT] - Hybrid Flip (1% -> 30% -> 10%)
    # Longs: 1% init, Shorts: 1% init. 
    # Pyramid #1 (Load): 30% Risk. Pyramid #2+ (Scale): 10% Risk.
    risk_per_trade_dollars: 0.0  # Use percentage-based risk
    risk_per_trade_pct: 0.01  # 1% Initial Probe
    short_risk_pct: 0.01      # 1% Initial Probe
    # Actually, let's keep max loss high enough to allow the 30% load risk.
    # If account is $500, 30% is $150. Max loss must be > $150.
    # Let's up it to $500 (100% of acct) to allow the strategy to run.
    max_loss_per_trade_dollars: 500.0  
    max_concurrent_positions: 4
    multi_position_enabled: true
    max_pyramid_entries: 6
    pyramid_profit_buffer_pct: 0.0015  # 0.15% profit (Relaxed Buffer)

    # [HYBRID FLIP PARAMS]
    pyramid_risk_load: 0.30   # 30% Risk for First Add
    pyramid_risk_scale: 0.10  # 10% Risk for Subsequent Adds

    # [BREAKEVEN TRAIL] - Lock in profit from first pyramid entry
    breakeven_trail_after_pyramids: 1  # After 1st entry, move stop to BE + trail
    breakeven_trail_pct: 0.003         # 0.3% above breakeven (protects 🔺1 trades)
    stop_atr_multiplier: 1.5  # Tighter stop (not 2.0)
    
    # [SMART EXIT] - Only exit on HTF flip if in loss
    exit_on_htf_flip_only_if_losing: true
    
    # [ICC SCORING]
    icc_entry_score_threshold: 35.0
    icc_score_continuation_points: 60.0
    icc_score_sweep_points: 25.0
    icc_score_htf_ltf_align_points: 20.0
    icc_score_strong_htf_points: 15.0
    icc_score_phase_points: 5.0
    icc_auto_entry_min_htf_strength: 0.0  # [ROBOCOP] Drop floor to zero for machine entry
    icc_auto_entry_enabled: true
    icc_aggressive_mode: true            # [ROBOCOP] Enable aggressive scaling flows
    icc_confirmation_bars: 2
    
    icc_strict_mode: true # Strict Mode: Enable No Trade Zone hard block
    icc_require_liquidity_grab: true # Strict Mode: Must sweep liquidity before continuation
    
    symbols:
    - EURUSD
    - GBPUSD
    - USDJPY
    - AUDUSD
    - USDCAD
    - USDCHF
    - NZDUSD
    - GBPJPY
    - EURJPY
    - AUDJPY
    # [ANTIGRAVITY ADD] Commodities
    # - XAUUSD # Gold (disabled: IBKR permissions pending)
    # - XAGUSD # Silver (disabled: IBKR permissions pending)
    # - XPTUSD # Platinum (disabled: IBKR permissions pending)
    # - XPDUSD # Palladium (NOT available as CMDTY on IBKR - only ETFs like PHPD)
    # - USO    # Oil Interest (ETF/Stock - subject to PDT rules, not Forex)
    # [ANTIGRAVITY ADD] Crypto (Live Management)
    - BTCUSD
