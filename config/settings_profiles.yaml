profiles:
  # Forex Intraday - IBKR Forex with Graduated Entry + Smart Exits
  # Backtested: +116% return over 3 months (Oct 2025 - Jan 2026)
  forex_intraday:
    candle_timeframe: 15m  # Use 15m for less noisy HTF
    market_poll_interval_seconds: 10
    ai_decision_interval_seconds: 60
    htf_timeframe: 1h      # HTF = 1 hour for trend direction
    ltf_timeframe: 15m     # LTF = 15min for entries
    trend_window: 12
    ltf_trend_window: 8
    trend_swing_lookback: 2
    trend_min_swings: 2
    trend_strength_floor: 0.25  # Low bar for directional bias
    structure_score_threshold: 0.05
    auto_flatten_on_close: false
    pdt_guard_enabled: false  # Forex has no PDT
    
    # [RISK MANAGEMENT] - Hybrid Flip (1% -> 30% -> 10%)
    # Longs: 1% init, Shorts: 1% init. 
    # Pyramid #1 (Load): 30% Risk. Pyramid #2+ (Scale): 10% Risk.
    risk_per_trade_pct: 0.01  # 1% Initial Probe
    short_risk_pct: 0.01      # 1% Initial Probe
    max_loss_per_trade_dollars: 50.0 # Safety Cap (Lowered for probe) - Wait, Load is big? 
    # Actually, let's keep max loss high enough to allow the 30% load risk.
    # If account is $500, 30% is $150. Max loss must be > $150.
    # Let's up it to $500 (100% of acct) to allow the strategy to run.
    max_loss_per_trade_dollars: 500.0  
    
    max_concurrent_positions: 1
    max_pyramid_entries: 6    # 1 Load + 5 Scale
    pyramid_profit_buffer_pct: 0.0015  # 0.15% profit (Relaxed Buffer)
    
    # [HYBRID FLIP PARAMS]
    pyramid_risk_load: 0.30   # 30% Risk for First Add
    pyramid_risk_scale: 0.10  # 10% Risk for Subsequent Adds
    stop_atr_multiplier: 1.5  # Tighter stop (not 2.0)
    
    # [SMART EXIT] - Only exit on HTF flip if in loss
    exit_on_htf_flip_only_if_losing: true
    
    # [ICC SCORING]
    icc_entry_score_threshold: 35.0
    icc_score_continuation_points: 60.0
    icc_score_sweep_points: 25.0
    icc_score_htf_ltf_align_points: 20.0
    icc_score_strong_htf_points: 15.0
    icc_score_phase_points: 5.0
    icc_auto_entry_require_sweep: false
    icc_auto_entry_min_htf_strength: 0.25  # Low bar - just need direction
    icc_auto_entry_enabled: true
    icc_confirmation_bars: 2
    
    icc_strict_mode: true # Enforce No Trade Zone logic
    icc_require_liquidity_grab: true # Prefer corrections that sweep liquidity
    
    symbols:
    - EURUSD
    - GBPUSD
    - USDJPY
    - AUDUSD
    - USDCAD
    - USDCHF
    - NZDUSD
    # [ANTIGRAVITY ADD] Commodities
    - XAUUSD # Gold
    - XAGUSD # Silver
    - XPTUSD # Platinum
    - XPDUSD # Palladium
    - USO    # Oil Interest
    # [ANTIGRAVITY ADD] Crypto (Live Management)
    - BTCUSD
    - ETHUSD
    - SOLUSD

    # [IBKR CRYPTO CONFIG]
    crypto_qty_steps:
      BTCUSD: 0.0001
      ETHUSD: 0.001
      SOLUSD: 0.01

