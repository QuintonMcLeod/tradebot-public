    trend_strength_floor: 0.25  # Reasonable floor for trend detection
    structure_score_threshold: 0.05
    auto_flatten_on_close: false
    crypto_only: true  # Enable 24/7 trading for crypto backtest

    # [RISK MANAGEMENT] - ICC Standard (aggressive + compounding)
    risk_per_trade_pct: 0.012  # 1.2% Risk ("Feet Wet" Initial Entry)
    aggressive_risk_per_trade_pct: 0.10  # 10% Risk per Pyramid (3x = 30% Total)
    max_loss_per_trade_dollars: 100.0  # Safety Cap
    max_concurrent_positions: 1
    max_pyramid_entries: 3  # Allow 3 aggressive adds

    # [HIGH FREQUENCY ICC] - Target 2-5 trades per day
    # Key: 1-bar confirmation + wider sweep window
    icc_confirmation_bars: 1  # 1-bar confirmation (faster entries)
    icc_max_bars_after_sweep: 30  # Wide window to catch setups

    # [ICC SCORING] Entry threshold and points
    icc_entry_score_threshold: 35.0  # Balanced threshold
    icc_score_continuation_points: 60.0  # Continuation auto-passes threshold
    icc_score_sweep_points: 25.0  # Good sweep bonus
    icc_score_htf_ltf_align_points: 20.0  # Trend alignment matters
    icc_score_strong_htf_points: 15.0  # Strong HTF trend bonus
    icc_score_phase_points: 5.0  # Phase bonus
    icc_auto_entry_require_sweep: false  # Continuation alone is enough
    icc_auto_entry_min_htf_strength: 0.3  # Require HTF alignment (filters trades against HTF)
    icc_auto_entry_enabled: true  # Auto-entry on continuation
    icc_two_signal_override_enabled: true  # Fast entry on sweep+continuation

