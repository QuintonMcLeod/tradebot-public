  coinbase_futures_nano:
    candle_timeframe: 5m
    market_poll_interval_seconds: 5
    ai_decision_interval_seconds: 60
    ai_enabled: true
    # [ANTIGRAVITY] Nano Futures Strategy (US Compliant)
    # Target: "Monthly Millions" Growth
    # Instrument: Nano Ether (ETP) - 1/10th ETH Size
    # Venue: Coinbase Derivatives (via Advanced Trade Cloud Key)
    # Risk: Aggressive (1.5% Risk per Trade on $68 capital)
    # Note: Uses 2030 Expiration contracts (ETP-20DEC30-CDE) to simulate Perp behavior (no roll).
    description: "Coinbase Nano Futures (ETP/BIP) for Aggressive Growth"
    
    # Symbols
    # ETP    market_type: future
    
    # [ANTIGRAVITY] Safety Cap (70% to prevent Insufficient Funds)
    balance_cap_pct: 0.70
    
    # BIP = Nano Bitcoin (1/100 BTC)
    days_to_expiry: 16  # Jan 2026 Front Month
    symbols: 
      # [ANTIGRAVITY] US Regulated Nano Futures (Affordable ~$86 Balance)
      # Full US Regulated Nano Universe (Affordability Checked Dynamically)
      - "AVAX/USD:USD-260130"
      - "SHIB/USD:USD-260130"
      - "ETH/USD:USD-260130"
      - "ADA/USD:USD-260130"
      - "SOL/USD:USD-260130"
      - "DOGE/USD:USD-260130"
      - "LINK/USD:USD-260130"
      - "LTC/USD:USD-260130"
      - "BTC/USD:USD-260130"  # Likely unaffordable, but check will block it cleanly.
      # - SOL ($147), DOGE ($150), LINK ($143), BTC ($195)
      
      # Too Expensive for $86 Margin:
      # - BTC (~$975), XRP (~$1080), XLM (~$1200)
      
      # [NOTE] US Customers cannot trade Perps (INJ, ORDI, etc.)
      # We are restricted to BIT/ET/LTC/BCH/DOG futures.
      # Currently targeting Jan 2026 Front Month.
    
    # Timeframes
    timeframes:
      primary: "5m"      # Fast entries
      htf: "15m"         # Trend confirmation
    htf_timeframe: "15m"
    ltf_timeframe: "5m"
    trend_swing_lookback: 3  # [ANTIGRAVITY FIX] Match auto_schedule specific sensitivity
      
    # Risk settings (Aggressive)
    risk_per_trade_pct: 0.015  # 1.5% risk (allows ~3 bullets)
    max_open_positions: 1      # Focus on single best setup
    icc_auto_entry_min_htf_strength: 0.0
    icc_score_sweep_points: 30.0
    icc_score_continuation_points: 60.0  # [ANTIGRAVITY FIX] Boost to Automatic Pass
    icc_entry_score_threshold: 60.0      # [ANTIGRAVITY FIX] Explicit Threshold
    # [ANTIGRAVITY ATTACHMENT] Bonus Points from Auto_Schedule
    icc_score_htf_ltf_align_points: 20.0
    icc_score_strong_htf_points: 25.0
    icc_score_phase_points: 10.0
    icc_score_htf_strength_threshold: 0.65
    icc_score_indication_points: 10.0
    icc_two_signal_override_enabled: true
    
    # Execution
    order_type: "MARKET"       # Guaranteed entry (Nano liquidity is good)
    
    # Capital Constraints
    # Nano ETH Notional ~ $310. Min margin ~ $85.
    crypto_min_notional_usd: 2.50 
    
    # Environment
    # Requires: CCXT_API_KEY (Cloud Key), CCXT_EXCHANGE=coinbase
    synthetic_stop_persistence_enabled: true
    synthetic_stop_store_path: data/synthetic_stops_coinbase.json
    
    runtime_overrides:
      broker_mode: "primary" # Use CCXT as primary
      flatten_on_exit: false
      cancel_orders_on_start: false
